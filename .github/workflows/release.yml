name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish src/KnowHowToAI.Cli/KnowHowToAI.Cli.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o ./publish

      - name: Prepare Release Archive
        shell: pwsh
        run: |
          # README.md ins Publish-Verzeichnis kopieren
          if (Test-Path "README.md") {
            Copy-Item "README.md" "./publish/README.md"
          }

          # Archiv aus dem Publish-Verzeichnis erstellen (kein "publish/"-Prefix im Archiv)
          Push-Location "./publish"
          7z a "../KnowHowToAI-win-x64.zip" . -r | Out-Null
          Pop-Location

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ./KnowHowToAI-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
